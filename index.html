<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>はれもよう</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="sky-bg" aria-hidden="true">
      <div class="bg-fuwahare bg-seed one"></div>
      <div class="bg-fuwahare bg-middle two"></div>
      <div class="bg-fuwahare bg-rainbow three"></div>
      <div class="bg-fuwahare bg-full four"></div>
      <div class="bg-fuwahare bg-middle five"></div>
    </div>

    <div class="app-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">今日の小さな空</p>
          <h1>はれもよう</h1>
          <p id="dailyMessage" class="daily-message">
            まだ空っぽでも大丈夫。最初のひとつは、思い出よりも今の気分から始められます。
          </p>
        </div>
        <section class="growth-panel" aria-label="ふわはれの成長">
          <div id="currentCharacter" class="fuwahare seed" aria-hidden="true">
            <span class="face"></span>
          </div>
          <div>
            <p id="growthName" class="growth-name">はれの芽</p>
            <p id="growthCount" class="growth-count">0こ投稿で成長中</p>
          </div>
        </section>
      </header>

      <main class="main-grid">
        <section class="panel mood-panel">
          <div class="section-head">
            <h2>今のきもち</h2>
            <span id="saveNotice" class="notice" aria-live="polite"></span>
          </div>

          <div class="segment" role="tablist" aria-label="種類">
            <button class="segment-btn active" type="button" data-mood="happy">嬉しい</button>
            <button class="segment-btn" type="button" data-mood="fun">楽しい</button>
            <button class="segment-btn" type="button" data-mood="bad">嫌だった</button>
          </div>

          <div id="badModeWrap" class="bad-mode hidden">
            <div class="mini-segment" role="tablist" aria-label="嫌だった気持ちの扱い">
              <button class="mini-btn active" type="button" data-bad-mode="free">無料</button>
              <button class="mini-btn" type="button" data-bad-mode="paid">有料</button>
            </div>
            <p id="badModeDescription" class="bad-description">ふわはれが食べて、ここから消してくれます。</p>
            <div id="coachSteps" class="coach-steps hidden">
              <button type="button" class="step-btn active" data-step="1">1. まず気持ちを受け止める</button>
              <button type="button" class="step-btn" data-step="2">2. 何がつらかったかをほどく</button>
              <button type="button" class="step-btn" data-step="3">3. 次の自分を守る言葉にする</button>
            </div>
            <p id="coachPreview" class="coach-preview hidden"></p>
          </div>

          <label class="field-label" for="moodText">きもちを書く</label>
          <textarea id="moodText" maxlength="160" rows="5" placeholder="ほんのひと言でも大丈夫です。"></textarea>
          <div class="form-row count-row">
            <span id="charCount">0/160</span>
            <label class="photo-pick">
              <input id="photoInput" type="file" accept="image/*" />
              写真を添える
            </label>
          </div>
          <div id="photoPreviewWrap" class="photo-preview-wrap hidden">
            <img id="photoPreview" alt="添付した写真のプレビュー" />
            <button id="removePhoto" type="button" class="text-button">写真を外す</button>
          </div>
          <label class="check-line">
            <input id="shareCheck" type="checkbox" />
            <span>ダレカにも届ける</span>
          </label>
          <button id="saveButton" class="primary-button" type="button">残す</button>
        </section>

        <section class="panel favorites-panel">
          <h2>好きなものリスト</h2>
          <div class="add-row">
            <input id="favoriteInput" type="text" maxlength="30" placeholder="好きなものを追加" />
            <button id="addFavorite" type="button">追加</button>
          </div>
          <div id="favoriteChips" class="chips" aria-live="polite"></div>
        </section>

        <section class="panel calendar-panel">
          <div class="calendar-title-row">
            <h2>きろく</h2>
            <div class="month-controls">
              <button id="prevMonth" type="button" aria-label="前月">‹</button>
              <span id="monthLabel"></span>
              <button id="nextMonth" type="button" aria-label="次月">›</button>
            </div>
          </div>
          <div class="calendar-weekdays" aria-hidden="true">
            <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
          <div class="filters" aria-label="きろくの絞り込み">
            <button class="filter-btn active" type="button" data-filter="all">すべて</button>
            <button class="filter-btn" type="button" data-filter="happy">嬉しい</button>
            <button class="filter-btn" type="button" data-filter="fun">楽しい</button>
            <button class="filter-btn" type="button" data-filter="lesson">学び</button>
          </div>
          <div id="recordsList" class="records-list" aria-live="polite"></div>
        </section>

        <section class="panel shared-panel">
          <h2>ダレカの幸せ</h2>
          <div id="sharedList" class="shared-list"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
